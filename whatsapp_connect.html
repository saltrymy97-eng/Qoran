<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوت جامعة القرآن - واتساب</title>
    <style>
        body { font-family: Arial; background: #075e54; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: white; border-radius: 10px; padding: 30px; max-width: 500px; width: 100%; }
        h1 { color: #075e54; text-align: center; }
        .status { background: #dcf8c6; padding: 10px; border-radius: 5px; text-align: center; margin: 10px 0; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #25d366; color: white; padding: 12px; border: none; border-radius: 5px; font-size: 16px; width: 100%; cursor: pointer; margin: 5px 0; }
        button:hover { background: #128c7e; }
        .response { background: #f0f0f0; padding: 15px; border-radius: 5px; margin-top: 15px; display: none; white-space: pre-wrap; }
        .note { background: #fff3cd; padding: 10px; border-radius: 5px; margin: 10px 0; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕌 بوت جامعة القرآن<br>فرع غيل باوزير</h1>
        <div class="status">✅ البوت جاهز</div>
        <input type="text" id="userMessage" placeholder="اكتب سؤالك هنا..." />
        <button onclick="askBot()">📤 إرسال</button>
        <div class="response" id="response"></div>
    </div>

    <script>
        async function askBot() {
            const msg = document.getElementById('userMessage').value.trim();
            const resDiv = document.getElementById('response');
            if (!msg) return;
            resDiv.style.display = 'block';
            resDiv.innerHTML = '⏳ جاري الرد...';
            try {
                const res = await fetch('http://localhost:5000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                resDiv.innerHTML = '🤖 <b>الرد:</b>\n' + data.reply;
                document.getElementById('userMessage').value = '';
            } catch (e) {
                resDiv.innerHTML = '❌ تأكد أن البوت شغال!';
            }
        }
        document.getElementById('userMessage').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') askBot();
        });
    </script>
</body>
</html>
